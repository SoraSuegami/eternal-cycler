name: ExecPlan Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  execplan-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Run ExecPlan unit tests
        run: bash tests/execplan_tests.sh
